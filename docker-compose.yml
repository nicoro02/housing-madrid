services:
  mongo:
    image: mongo:7
    container_name: housing-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}

  postgres:
    image: postgres:16
    container_name: housing-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-housing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-housing}
      POSTGRES_DB: ${POSTGRES_DB:-housing}

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: housing-mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  mongo-data:
  postgres-data:
  mlflow-data:
